<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题库练习系统 — 入口</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0e17;
  --bg-card: #1a1f2e;
  --neon-cyan: #00f0ff;
  --neon-purple: #b44aff;
  --neon-pink: #ff2d95;
  --neon-green: #39ff14;
  --neon-orange: #ff6a00;
  --text-primary: #e0e6f0;
  --text-secondary: #8892a4;
  --border-color: #2a3050;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,240,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(180,74,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(255,45,149,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 40% 30%, rgba(57,255,20,0.02) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* Grid lines effect */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
  max-width: 900px;
  width: 100%;
}

/* Header */
.header {
  margin-bottom: 60px;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.8em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 25px rgba(0,240,255,0.4));
  letter-spacing: 4px;
  margin-bottom: 12px;
  line-height: 1.3;
}

.header .tagline {
  font-size: 1.05em;
  color: var(--text-secondary);
  letter-spacing: 2px;
}

.header .glow-line {
  width: 120px;
  height: 2px;
  margin: 16px auto 0;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
  border-radius: 1px;
}

/* Cards Grid */
.cards {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  position: relative;
  width: 360px;
  padding: 50px 30px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  overflow: hidden;
  cursor: pointer;
}

.card::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border-radius: 22px;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: transparent;
}

.card:hover::before {
  opacity: 1;
}

/* Card 1: IoT */
.card-iot::before {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-green));
}
.card-iot:hover {
  box-shadow: 0 0 30px rgba(0,240,255,0.2), 0 0 60px rgba(0,240,255,0.1), 0 20px 50px rgba(0,0,0,0.4);
}
.card-iot .card-icon {
  color: var(--neon-cyan);
  text-shadow: 0 0 15px rgba(0,240,255,0.4);
}
.card-iot .card-badge {
  background: rgba(0,240,255,0.1);
  border: 1px solid rgba(0,240,255,0.3);
  color: var(--neon-cyan);
}

/* Card 2: MySQL */
.card-mysql::before {
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
}
.card-mysql:hover {
  box-shadow: 0 0 30px rgba(180,74,255,0.2), 0 0 60px rgba(180,74,255,0.1), 0 20px 50px rgba(0,0,0,0.4);
}
.card-mysql .card-icon {
  color: var(--neon-purple);
  text-shadow: 0 0 15px rgba(180,74,255,0.4);
}
.card-mysql .card-badge {
  background: rgba(180,74,255,0.1);
  border: 1px solid rgba(180,74,255,0.3);
  color: var(--neon-purple);
}

.card-icon {
  font-size: 3em;
  margin-bottom: 16px;
  transition: transform 0.4s;
}
.card:hover .card-icon {
  transform: scale(1.15);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.35em;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.card-subtitle {
  font-size: 0.9em;
  color: var(--text-secondary);
  margin-bottom: 18px;
}

.card-badge {
  display: inline-block;
  padding: 5px 18px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 500;
  letter-spacing: 1px;
}

.card-shine {
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent);
  transform: skewX(-20deg);
  transition: left 0.8s;
}
.card:hover .card-shine {
  left: 150%;
}

/* Footer */
.footer {
  margin-top: 60px;
  color: var(--text-secondary);
  font-size: 0.8em;
  letter-spacing: 1px;
  opacity: 0.6;
}

/* Responsive */
@media (max-width: 800px) {
  .header h1 { font-size: 2em; }
  .cards { gap: 24px; }
  .card { width: 100%; max-width: 360px; padding: 40px 24px 32px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>题库练习系统</h1>
    <p class="tagline">SELECT * FROM knowledge WHERE topic IS NOT NULL;</p>
    <div class="glow-line"></div>
  </div>

  <div class="cards">
    <!-- 物联网题库 -->
    <a href="index_wulianwang.html" class="card card-iot">
      <div class="card-shine"></div>
      <div class="card-icon">&#9881;</div>
      <div class="card-title">物联网 / CC2530</div>
      <div class="card-subtitle">嵌入式系统 · 单片机 · 传感器</div>
      <span class="card-badge">325 题</span>
    </a>

    <!-- MySQL 题库 -->
    <a href="index_mysql.html" class="card card-mysql">
      <div class="card-shine"></div>
      <div class="card-icon">&#9827;</div>
      <div class="card-title">MySQL 数据库</div>
      <div class="card-subtitle">SQL · 存储过程 · 索引 · 事务</div>
      <span class="card-badge">97 题</span>
    </a>
  </div>

  <div class="footer">
    Cyberpunk Quiz System &mdash; Choose Your Protocol
  </div>
</div>

</body>
</html>

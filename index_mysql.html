<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySQL数据库题库练习系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a1f2e;
  --bg-card-hover: #222840;
  --neon-cyan: #00f0ff;
  --neon-purple: #b44aff;
  --neon-pink: #ff2d95;
  --neon-green: #39ff14;
  --neon-orange: #ff6a00;
  --neon-yellow: #ffd700;
  --text-primary: #e0e6f0;
  --text-secondary: #8892a4;
  --border-color: #2a3050;
  --glow-cyan: 0 0 10px rgba(0,240,255,0.3), 0 0 30px rgba(0,240,255,0.1);
  --glow-purple: 0 0 10px rgba(180,74,255,0.3), 0 0 30px rgba(180,74,255,0.1);
  --glow-green: 0 0 10px rgba(57,255,20,0.3);
  --glow-pink: 0 0 10px rgba(255,45,149,0.3);
  --glow-yellow: 0 0 10px rgba(255,215,0,0.3);
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,240,255,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(180,74,255,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,45,149,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 0 30px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 30px;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.2em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(0,240,255,0.3));
  letter-spacing: 3px;
}

.header .subtitle {
  color: var(--text-secondary);
  margin-top: 8px;
  font-size: 0.95em;
}

.header .back-home {
  display: inline-block;
  margin-top: 14px;
  padding: 8px 22px;
  border: 1px solid var(--neon-cyan);
  border-radius: 20px;
  color: var(--neon-cyan);
  text-decoration: none;
  font-size: 0.85em;
  transition: all 0.3s;
  letter-spacing: 1px;
}
.header .back-home:hover {
  background: rgba(0,240,255,0.1);
  box-shadow: var(--glow-cyan);
}

/* Mode Selection */
.mode-selector {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
  flex-wrap: wrap;
}

.mode-btn {
  padding: 16px 40px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 1.1em;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  min-width: 200px;
}

.mode-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(180,74,255,0.1));
  transition: left 0.3s ease;
  z-index: 0;
}

.mode-btn:hover::before { left: 0; }

.mode-btn:hover {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  transform: translateY(-2px);
}

.mode-btn.active {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(180,74,255,0.1));
}

.mode-btn span {
  position: relative;
  z-index: 1;
}

/* Exam Config Panel */
.exam-config {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 30px;
  margin: 20px 0;
  display: none;
}

.exam-config.active { display: block; }

.exam-config h3 {
  color: var(--neon-cyan);
  margin-bottom: 20px;
  font-size: 1.2em;
}

.config-row {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.config-row label {
  min-width: 100px;
  color: var(--text-secondary);
}

.config-row input[type="number"] {
  width: 80px;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 1em;
}

.config-row input:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}

.config-row select {
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 1em;
}

.config-row select:focus {
  outline: none;
  border-color: var(--neon-cyan);
}

.start-exam-btn {
  padding: 14px 50px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.3s ease;
  letter-spacing: 1px;
}

.start-exam-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(0,240,255,0.4), 0 0 60px rgba(180,74,255,0.2);
}

/* Timer Bar */
.timer-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,14,23,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-color);
  padding: 12px 20px;
  display: none;
  justify-content: space-between;
  align-items: center;
}

.timer-bar.active { display: flex; }

.timer-display {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5em;
  color: var(--neon-cyan);
  text-shadow: 0 0 10px rgba(0,240,255,0.5);
}

.timer-display.warning { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255,106,0,0.5); }
.timer-display.danger { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255,45,149,0.5); animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.timer-info {
  display: flex;
  gap: 20px;
  align-items: center;
}

.timer-info .answered-count {
  color: var(--neon-green);
  font-size: 0.95em;
}

.submit-exam-btn {
  padding: 10px 30px;
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
  border: none;
  border-radius: 6px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.submit-exam-btn:hover {
  box-shadow: var(--glow-pink);
  transform: translateY(-1px);
}

/* Nav Bar */
.nav-bar {
  position: sticky;
  top: 60px;
  z-index: 99;
  background: rgba(10,14,23,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-color);
  padding: 12px 20px;
  display: none;
}

.nav-bar.active { display: block; }

.nav-bar-wrapper {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.nav-bar .nav-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  flex: 1;
}

.nav-bar.collapsed .nav-inner {
  flex-wrap: nowrap;
  overflow-x: auto;
  justify-content: flex-start;
  scroll-behavior: smooth;
}

.nav-bar.collapsed .nav-inner::-webkit-scrollbar { height: 4px; }
.nav-bar.collapsed .nav-inner::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.nav-toggle-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--neon-cyan);
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.nav-toggle-btn:hover {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}

.nav-dot {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.75em;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-dot:hover {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
}

.nav-dot.answered {
  background: rgba(0,240,255,0.15);
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
}

.nav-dot.current {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  color: #000;
  font-weight: 700;
  border-color: transparent;
}

/* Question Cards */
.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.question-card:hover {
  border-color: rgba(0,240,255,0.3);
  box-shadow: 0 0 20px rgba(0,240,255,0.05);
}

.question-card.highlight {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}

.question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.question-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85em;
  color: var(--neon-purple);
  background: rgba(180,74,255,0.1);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid rgba(180,74,255,0.3);
}

.question-kind {
  font-size: 0.8em;
  padding: 4px 10px;
  border-radius: 4px;
  font-weight: 500;
}

.kind-single {
  color: var(--neon-cyan);
  background: rgba(0,240,255,0.1);
  border: 1px solid rgba(0,240,255,0.3);
}

.kind-multi {
  color: var(--neon-orange);
  background: rgba(255,106,0,0.1);
  border: 1px solid rgba(255,106,0,0.3);
}

.kind-blank {
  color: var(--neon-yellow);
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
}

.kind-true-false {
  color: var(--neon-green);
  background: rgba(57,255,20,0.1);
  border: 1px solid rgba(57,255,20,0.3);
}

.question-stem {
  font-size: 1.05em;
  line-height: 1.8;
  margin-bottom: 18px;
  color: var(--text-primary);
}

.options-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-item {
  padding: 12px 16px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-secondary);
}

.option-item:hover {
  border-color: var(--neon-cyan);
  background: rgba(0,240,255,0.05);
}

.option-item.selected {
  border-color: var(--neon-cyan);
  background: rgba(0,240,255,0.1);
  box-shadow: inset 0 0 10px rgba(0,240,255,0.05);
}

.option-item .option-key {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85em;
  color: var(--neon-cyan);
  min-width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(0,240,255,0.3);
  border-radius: 50%;
}

.option-item.selected .option-key {
  background: var(--neon-cyan);
  color: #000;
}

/* Blank input */
.blank-input {
  width: 100%;
  max-width: 500px;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--neon-yellow);
  font-size: 1em;
  font-family: 'Noto Sans SC', monospace;
  transition: all 0.2s ease;
}

.blank-input:focus {
  outline: none;
  border-color: var(--neon-yellow);
  box-shadow: var(--glow-yellow);
}

.blank-input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* Result styles */
.option-item.correct {
  border-color: var(--neon-green);
  background: rgba(57,255,20,0.1);
}

.option-item.correct .option-key {
  background: var(--neon-green);
  color: #000;
  border-color: var(--neon-green);
}

.option-item.wrong {
  border-color: var(--neon-pink);
  background: rgba(255,45,149,0.1);
}

.option-item.wrong .option-key {
  background: var(--neon-pink);
  color: #000;
  border-color: var(--neon-pink);
}

.blank-input.correct-blank {
  border-color: var(--neon-green);
  box-shadow: var(--glow-green);
  color: var(--neon-green);
}

.blank-input.wrong-blank {
  border-color: var(--neon-pink);
  box-shadow: var(--glow-pink);
  color: var(--neon-pink);
}

/* Review mode toggle */
.review-toggle {
  padding: 8px 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--neon-cyan);
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s ease;
  margin-top: 15px;
}

.review-toggle:hover {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}

/* Explanation */
.explanation {
  margin-top: 15px;
  padding: 15px;
  background: rgba(180,74,255,0.05);
  border: 1px solid rgba(180,74,255,0.2);
  border-radius: 8px;
  line-height: 1.7;
  display: none;
}

.explanation.visible { display: block; }

.explanation .label {
  color: var(--neon-purple);
  font-weight: 700;
  margin-bottom: 5px;
  font-size: 0.9em;
}

.explanation .answer-label {
  color: var(--neon-green);
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 0.95em;
}

/* Review Filters */
.filters {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-btn {
  padding: 8px 20px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 0.9em;
}

.filter-btn:hover {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
}

.filter-btn.active {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
  background: rgba(0,240,255,0.1);
  box-shadow: var(--glow-cyan);
}

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 0.95em;
}

.search-input:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}

.search-input::placeholder {
  color: var(--text-secondary);
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 30px 0;
  flex-wrap: wrap;
}

.page-btn {
  padding: 8px 14px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 0.9em;
}

.page-btn:hover {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
}

.page-btn.active {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  color: #000;
  font-weight: 700;
  border-color: transparent;
}

.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.pagination .page-info {
  color: var(--text-secondary);
  font-size: 0.9em;
  margin: 0 10px;
}

/* Score Display */
.score-panel {
  background: var(--bg-card);
  border: 2px solid var(--neon-cyan);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  margin: 30px 0;
  box-shadow: var(--glow-cyan);
  display: none;
}

.score-panel.active { display: block; }

.score-panel h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8em;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 25px;
}

.score-circle {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin: 0 auto 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 4px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan), inset 0 0 30px rgba(0,240,255,0.1);
}

.score-circle .score-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.8em;
  font-weight: 900;
  color: var(--neon-cyan);
  line-height: 1;
}

.score-circle .score-label {
  font-size: 0.85em;
  color: var(--text-secondary);
  margin-top: 5px;
}

.score-stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 25px 0;
  flex-wrap: wrap;
}

.stat-item {
  padding: 12px 25px;
  border-radius: 8px;
  text-align: center;
}

.stat-item.correct-stat {
  background: rgba(57,255,20,0.1);
  border: 1px solid rgba(57,255,20,0.3);
}

.stat-item.wrong-stat {
  background: rgba(255,45,149,0.1);
  border: 1px solid rgba(255,45,149,0.3);
}

.stat-item.skip-stat {
  background: rgba(255,106,0,0.1);
  border: 1px solid rgba(255,106,0,0.3);
}

.stat-item .stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8em;
  font-weight: 700;
}

.stat-item.correct-stat .stat-num { color: var(--neon-green); }
.stat-item.wrong-stat .stat-num { color: var(--neon-pink); }
.stat-item.skip-stat .stat-num { color: var(--neon-orange); }

.stat-item .stat-text {
  color: var(--text-secondary);
  font-size: 0.85em;
  margin-top: 4px;
}

.review-results-btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: transparent;
  border: 2px solid var(--neon-cyan);
  border-radius: 8px;
  color: var(--neon-cyan);
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.review-results-btn:hover {
  background: rgba(0,240,255,0.1);
  box-shadow: var(--glow-cyan);
}

.back-btn {
  padding: 10px 25px;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 20px;
  display: inline-block;
}

.back-btn:hover {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 1.5em; }
  .mode-btn { min-width: 150px; padding: 12px 25px; }
  .question-card { padding: 18px; }
  .score-stats { gap: 15px; }
  .timer-display { font-size: 1.1em; }
}

/* Wrong Book */
.wrong-book-btn {
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1.1em;
  padding: 2px 8px;
  transition: all 0.2s;
  margin-left: 8px;
  vertical-align: middle;
}
.wrong-book-btn:hover { border-color: var(--neon-orange); color: var(--neon-orange); }

<script>
const allQuestions = [{"id": 1, "kind": "single", "stem": "1、DB表是MySQL中最重要的一个权限表，记录允许连接到服务器的账号信息（ ）。", "options": [{"key": "A", "text": "host"}, {"key": "B", "text": "tables_priv"}, {"key": "C", "text": "user"}, {"key": "D", "text": "columns_priv"}], "answer": ["C"], "explanation": "DB表（即user表）是MySQL中最重要的权限表，记录允许连接到服务器的账号信息。"}, {"id": 2, "kind": "blank", "stem": "2、MySQL安装成功后，在系统中会默认建立一个____用户。", "options": [], "answer": ["root"], "explanation": "MySQL安装成功后，默认会建立一个名为root的超级用户。"}, {"id": 3, "kind": "single", "stem": "3、用户的身份由（ ）来决定。", "options": [{"key": "A", "text": "用户的IP地址和主机名"}, {"key": "B", "text": "用户使用的用户名和密码"}, {"key": "C", "text": "用户的IP地址和使用的用户名"}, {"key": "D", "text": "用户用于连接的主机名和使用的用户名"}], "answer": ["D"], "explanation": "MySQL中用户的身份由用户名和主机名（即连接来源）共同决定，不同主机上的同名用户视为不同用户。"}, {"id": 4, "kind": "single", "stem": "4、保护数据库，防止未经授权的或不合法的使用造成的数据泄露、更改破坏。这是指数据的（ ）。", "options": [{"key": "A", "text": "安全性"}, {"key": "B", "text": "完整性"}, {"key": "C", "text": "并发控制"}, {"key": "D", "text": "恢复"}], "answer": ["A"], "explanation": "安全性指保护数据库，防止未经授权的访问造成的数据泄露、更改和破坏。"}, {"id": 5, "kind": "single", "stem": "5、收到用户的访问请求后，MySQL最先在（ ）表中检查用户的权限。", "options": [{"key": "A", "text": "host"}, {"key": "B", "text": "user"}, {"key": "C", "text": "db"}, {"key": "D", "text": "priv"}], "answer": ["B"], "explanation": "MySQL收到访问请求后，最先检查user表中的全局权限。"}, {"id": 6, "kind": "single", "stem": "6、在数据库管理系统中，对存取权限的定义为（ ）。", "options": [{"key": "A", "text": "命令"}, {"key": "B", "text": "授权"}, {"key": "C", "text": "定义"}, {"key": "D", "text": "审计"}], "answer": ["B"], "explanation": "在数据库管理系统中，对存取权限的定义称为授权（Authorization）。"}, {"id": 7, "kind": "single", "stem": "7、要想删除用户，应使用（ ）语句。", "options": [{"key": "A", "text": "DELETE USER"}, {"key": "B", "text": "DROP USER"}, {"key": "C", "text": "DELETE PRIV"}, {"key": "D", "text": "DROP PRIV"}], "answer": ["B"], "explanation": "删除用户使用DROP USER语句，DELETE USER不是合法的SQL语法。"}, {"id": 8, "kind": "single", "stem": "8、使用select语句将表中数据导出到文件，可以使用哪一子句？（ ）", "options": [{"key": "A", "text": "TO FILE"}, {"key": "B", "text": "INTO FILE"}, {"key": "C", "text": "OUTTO FILE"}, {"key": "D", "text": "INTO OUTFILE"}], "answer": ["D"], "explanation": "SELECT ... INTO OUTFILE 可以将查询结果导出到文件。"}, {"id": 9, "kind": "single", "stem": "9、以下哪个表不用于MySQL的权限管理？（ ）", "options": [{"key": "A", "text": "USER"}, {"key": "B", "text": "DB"}, {"key": "C", "text": "COLUMNS_PRIV"}, {"key": "D", "text": "MANAGER"}], "answer": ["D"], "explanation": "MySQL权限管理中涉及的表有user、db、tables_priv、columns_priv、procs_priv等，没有MANAGER表。"}, {"id": 10, "kind": "single", "stem": "10、（ ）备份是指在某一次完整备份的基础上，只备份其后数据的变化。", "options": [{"key": "A", "text": "差异"}, {"key": "B", "text": "检查"}, {"key": "C", "text": "增量"}, {"key": "D", "text": "二次"}], "answer": ["C"], "explanation": "增量备份是在某一次完整备份的基础上，只备份其后数据的变化。差异备份是备份自上次完整备份以来所有变化。"}, {"id": 11, "kind": "single", "stem": "11、下述哪一个是SQL中的授权命令？（ ）", "options": [{"key": "A", "text": "GRANT"}, {"key": "B", "text": "COMMIT"}, {"key": "C", "text": "UPDATE"}, {"key": "D", "text": "SELECT"}], "answer": ["A"], "explanation": "SQL中的授权命令是GRANT，COMMIT是事务提交，UPDATE和SELECT是DML语句。"}, {"id": 12, "kind": "blank", "stem": "12、在MySQL中，授权使用 GRANT 命令，收回权限使用____命令。", "options": [], "answer": ["REVOKE"], "explanation": "GRANT用于授权，REVOKE用于收回权限。"}, {"id": 13, "kind": "blank", "stem": "13、MySQL的访问控制分为两个阶段，分别是____阶段和请求核实阶段。", "options": [], "answer": ["连接核实"], "explanation": "MySQL访问控制分为连接核实和请求核实两个阶段。连接核实验证用户身份，请求核实验证操作权限。"}, {"id": 14, "kind": "single", "stem": "14、触发器的触发事件可以有三种，下面哪一种不能作为触发器的触发事件？（ ）", "options": [{"key": "A", "text": "UPDATE"}, {"key": "B", "text": "DELETE"}, {"key": "C", "text": "ALTER"}, {"key": "D", "text": "INSERT"}], "answer": ["C"], "explanation": "触发器支持INSERT、UPDATE、DELETE三种触发事件，ALTER属于DDL，不能作为触发器的触发事件。"}, {"id": 15, "kind": "single", "stem": "15、存储过程和存储函数的相关信息存放在（ ）数据库中。", "options": [{"key": "A", "text": "mysql"}, {"key": "B", "text": "information_schema"}, {"key": "C", "text": "performance_schema"}, {"key": "D", "text": "test"}], "answer": ["B"], "explanation": "存储过程和存储函数的信息存放在information_schema数据库的ROUTINES表中。"}, {"id": 16, "kind": "single", "stem": "16、一个触发器能定义在多少个表中？（ ）", "options": [{"key": "A", "text": "只有一个"}, {"key": "B", "text": "一个或者多个"}, {"key": "C", "text": "1~3个"}, {"key": "D", "text": "任意多个"}], "answer": ["A"], "explanation": "MySQL中一个触发器只能定义在一个表上，但一个表可以有多个触发器。"}, {"id": 17, "kind": "single", "stem": "17、下面选项中不属于存储过程和存储函数优点的是？（ ）", "options": [{"key": "A", "text": "增强代码的重用性和共享性"}, {"key": "B", "text": "可以加快运行速度，减少网络流量"}, {"key": "C", "text": "可以作为安全机制"}, {"key": "D", "text": "编辑简单"}], "answer": ["D"], "explanation": "存储过程和存储函数编辑并不简单，需要专门的语法知识，这是它们的缺点而非优点。"}, {"id": 18, "kind": "single", "stem": "18、在一个表上可以有几种不同事件类型的触发器？（ ）", "options": [{"key": "A", "text": "1"}, {"key": "B", "text": "2"}, {"key": "C", "text": "3"}, {"key": "D", "text": "无限制"}], "answer": ["C"], "explanation": "MySQL中一个表可以有3种触发器事件类型：INSERT、UPDATE、DELETE。"}, {"id": 19, "kind": "single", "stem": "19、使用哪条语句可以删除触发器trig_Test？（ ）", "options": [{"key": "A", "text": "DROP * FROM trig_Test"}, {"key": "B", "text": "DROP trig_Test"}, {"key": "C", "text": "DROP TRIGGER WHERE NAME='trig_Test'"}, {"key": "D", "text": "DROP TRIGGER trig_Test"}], "answer": ["D"], "explanation": "删除触发器的语法是DROP TRIGGER trig_Test;。"}, {"id": 20, "kind": "single", "stem": "20、（ ）是数据库管理系统的基本单位，它是用户定义的一组逻辑一致的程序序列。", "options": [{"key": "A", "text": "程序"}, {"key": "B", "text": "命令"}, {"key": "C", "text": "事务"}, {"key": "D", "text": "文件"}], "answer": ["C"], "explanation": "事务是数据库管理系统的基本单位，是用户定义的一组逻辑一致的程序序列。"}, {"id": 21, "kind": "single", "stem": "21、事务的原子性是指（ ）。", "options": [{"key": "A", "text": "事务中包括的所有操作要么都做，要么都不做"}, {"key": "B", "text": "一旦提交对数据库的改变是永久的"}, {"key": "C", "text": "一个事务内部的操作及使用的数据对并发的其他事务是隔离的"}, {"key": "D", "text": "事务必须使数据库从一个一致性状态变到另一个一致性状态"}], "answer": ["A"], "explanation": "事务的原子性（Atomicity）指事务中的所有操作要么都做，要么都不做。B是持久性，C是隔离性，D是一致性。"}, {"id": 22, "kind": "blank", "stem": "22、存储过程和存储函数的相关信息存放在____表中，触发器的相关信息存放在triggers表中。", "options": [], "answer": ["routines"], "explanation": "存储过程和存储函数信息存放在information_schema.ROUTINES表中，触发器信息存放在information_schema.TRIGGERS表中。"}, {"id": 23, "kind": "blank", "stem": "23、在MySQL中触发器的执行时间有两种：AFTER和____。", "options": [], "answer": ["before"], "explanation": "MySQL触发器执行时间有BEFORE和AFTER两种，分别表示在触发事件之前或之后执行。"}, {"id": 24, "kind": "single", "stem": "24、为了提高特定查询的速度，对sc(sno, cno, degree)关系创建唯一索引。应该创建在哪个属性（或属性组）上？（ ）", "options": [{"key": "A", "text": "(sno, cno)"}, {"key": "B", "text": "(sno, degree)"}, {"key": "C", "text": "(cno, degree)"}, {"key": "D", "text": "degree"}], "answer": ["A"], "explanation": "应在(sno, cno)属性组上创建唯一索引，因为学号和课程号组合唯一标识一条选课记录。"}, {"id": 25, "kind": "single", "stem": "25、在视图上不能完成的操作是？（ ）", "options": [{"key": "A", "text": "更新视图"}, {"key": "B", "text": "查询"}, {"key": "C", "text": "在视图上定义新的基本表"}, {"key": "D", "text": "在视图上定义新视图"}], "answer": ["C"], "explanation": "在视图上不能定义新的基本表，基本表只能通过CREATE TABLE创建。"}, {"id": 26, "kind": "single", "stem": "26、在SQL中删除一个视图的语句是？（ ）", "options": [{"key": "A", "text": "DELETE"}, {"key": "B", "text": "DROP"}, {"key": "C", "text": "CLEAR"}, {"key": "D", "text": "REVOKE"}], "answer": ["B"], "explanation": "删除视图使用DROP VIEW语句，DELETE用于删除数据，REVOKE用于收回权限。"}, {"id": 27, "kind": "single", "stem": "27、为了使索引键的值在基本表中唯一，在创建索引的语句中应该使用（ ）。", "options": [{"key": "A", "text": "UNIQUE"}, {"key": "B", "text": "COUNT"}, {"key": "C", "text": "DISTINCT"}, {"key": "D", "text": "UNION"}], "answer": ["A"], "explanation": "创建唯一索引使用UNIQUE关键字，保证索引键值在表中唯一。"}, {"id": 28, "kind": "single", "stem": "28、视图是一种虚拟表，视图的构造基于（ ）。\nI. 基本表  II. 视图  III. 索引", "options": [{"key": "A", "text": "I 或 II"}, {"key": "B", "text": "I 或 III"}, {"key": "C", "text": "II 或 III"}, {"key": "D", "text": "I、II 或 III"}], "answer": ["A"], "explanation": "视图可以基于基本表或视图构建，但不能基于索引构建，索引只是加速查询的物理结构。"}, {"id": 29, "kind": "single", "stem": "29、已知关系student(sno, sname, grade)，以下关于语句 CREATE INDEX s_index ON student (grade) 的描述中正确的是？（ ）", "options": [{"key": "A", "text": "按成绩降序创建了一个普通索引"}, {"key": "B", "text": "按成绩升序创建了一个普通索引"}, {"key": "C", "text": "按成绩降序创建了一个全文索引"}, {"key": "D", "text": "按成绩升序创建了一个全文索引"}], "answer": ["B"], "explanation": "CREATE INDEX默认创建升序普通B+树索引，全文索引需显式使用FULLTEXT关键字。"}, {"id": 30, "kind": "single", "stem": "30、在关系数据库中，为了简化用户的查询操作，而且不增加数据的存储空间，应该创建的数据库对象是？（ ）", "options": [{"key": "A", "text": "Table（表）"}, {"key": "B", "text": "Index（索引）"}, {"key": "C", "text": "Cursor（游标）"}, {"key": "D", "text": "View（视图）"}], "answer": ["D"], "explanation": "视图可以简化查询操作且不增加存储空间，因为视图只存储查询定义，不存储实际数据。"}, {"id": 31, "kind": "single", "stem": "31、在下列几种情况下不适合创建索引的是（ ）。", "options": [{"key": "A", "text": "字段的取值范围很小"}, {"key": "B", "text": "用作查询条件的字段"}, {"key": "C", "text": "频繁搜索的字段"}, {"key": "D", "text": "连接中频繁使用的字段"}], "answer": ["A"], "explanation": "字段取值范围很小（如性别）时不适合创建索引，因为区分度低，索引效果差。"}, {"id": 32, "kind": "single", "stem": "32、SQL的数据操作语句包括SELECT、INSERT、UPDATE和DELETE等。其中最重要也是使用最频繁的语句是（ ）。", "options": [{"key": "A", "text": "SELECT"}, {"key": "B", "text": "INSERT"}, {"key": "C", "text": "UPDATE"}, {"key": "D", "text": "DELETE"}], "answer": ["A"], "explanation": "SELECT是SQL中最重要、使用最频繁的语句，用于从数据库中检索数据。"}, {"id": 33, "kind": "single", "stem": "33、有三个关系S(S#,SNAME,SEX,DEPARTMENT)，C(C#,CNAME,TEACHER)，SC(S#,C#,GRADE)。若要查找每个学生的学号、姓名、选修的课程名和成绩，将使用关系（ ）。", "options": [{"key": "A", "text": "S、SC"}, {"key": "B", "text": "SC、C"}, {"key": "C", "text": "S、C"}, {"key": "D", "text": "S、SC、C"}], "answer": ["D"], "explanation": "需要S（学号、姓名）、SC（学号、课程号、成绩）、C（课程号、课程名）三个表联合查询。"}, {"id": 34, "kind": "single", "stem": "34、有三个关系S(S#,SNAME,SEX,DEPARTMENT)，C(C#,CNAME,TEACHER)，SC(S#,C#,GRADE)。若要查找姓名中第一个字为“王”的所有学生的学号和姓名，正确的SQL语句是？（ ）\nI.  SELECT S#,SNAME FROM S WHERE SNAME=‘王%’\nII. SELECT S#,SNAME FROM S WHERE SNAME LIKE ‘王%’\nIII.SELECT S#,SNAME FROM S WHERE SNAME LIKE ‘王_’", "options": [{"key": "A", "text": "I"}, {"key": "B", "text": "II"}, {"key": "C", "text": "III"}, {"key": "D", "text": "全部"}], "answer": ["B"], "explanation": "使用LIKE配合%通配符可以匹配以‘王’开头的所有姓名，等号不支持通配符，下划线只匹配单个字符。"}, {"id": 35, "kind": "single", "stem": "35、若要查询选修了三门以上课程的学生的学号，则正确的SQL语句是？（ ）", "options": [{"key": "A", "text": "SELECT S# FROM SC GROUP BY S# WHERE COUNT(*) > 3"}, {"key": "B", "text": "SELECT S# FROM SC GROUP BY S# HAVING COUNT(*) > 3"}, {"key": "C", "text": "SELECT S# FROM SC ORDER BY S# WHERE COUNT(*) > 3"}, {"key": "D", "text": "SELECT S# FROM SC ORDER BY S# HAVING COUNT(*) > 3"}], "answer": ["B"], "explanation": "GROUP BY后用HAVING筛选分组结果，WHERE不能用于聚合函数过滤，且分组查询必须用GROUP BY而非ORDER BY。"}, {"id": 36, "kind": "single", "stem": "36、若要查找由张静老师执教的数据库课程的平均成绩、最高成绩和最低成绩，则应使用关系（ ）。", "options": [{"key": "A", "text": "S和SC"}, {"key": "B", "text": "SC和C"}, {"key": "C", "text": "S和C"}, {"key": "D", "text": "S、SC和C"}], "answer": ["B"], "explanation": "查询张静老师执教的课程成绩，需要SC（成绩）和C（课程名、教师名）两个表。教师信息在C表中，不需要S表。"}, {"id": 37, "kind": "single", "stem": "37、有三个关系S(S#,SNAME,SEX,DEPARTMENT)，C(C#,CNAME,TEACHER)，SC(S#,C#,GRADE)。若要查找分数（GRADE）不及格的学生姓名（SNAME），正确的是？（ ）\nI. 嵌套子查询方式\nII. JOIN连接方式\nIII. 关联子查询方式", "options": [{"key": "A", "text": "I 和 II"}, {"key": "B", "text": "I 和 III"}, {"key": "C", "text": "II 和 III"}, {"key": "D", "text": "I、II 和 III"}], "answer": ["C"], "explanation": "子查询（嵌套查询）和JOIN连接查询都能实现不及格学生姓名查找，II和III正确。"}, {"id": 38, "kind": "single", "stem": "38、下列关于保持数据库完整性的叙述中哪一个是不正确的？（ ）", "options": [{"key": "A", "text": "向关系SC插入元组时，S#和C#都不能是空值"}, {"key": "B", "text": "可以任意删除关系SC中的元组"}, {"key": "C", "text": "向任何一个关系插入元组时，必须保证该关系主键值的唯一性"}, {"key": "D", "text": "可以任意删除关系C中的元组"}], "answer": ["D"], "explanation": "不能任意删除关系C中的元组，因为C中的课程号可能被SC表的外键引用，违反参照完整性。"}, {"id": 39, "kind": "single", "stem": "39、检索所有比“王华”年龄大的学生的姓名、年龄和性别。下面正确的SELECT语句是？（ ）", "options": [{"key": "A", "text": "SELECT SN,AGE,SEX FROM S WHERE AGE>(SELECT AGE FROM S WHERE SN=‘王华’)"}, {"key": "B", "text": "SELECT SN,AGE,SEX FROM S WHERE SN=‘王华’"}, {"key": "C", "text": "SELECT SN,AGE,SEX FROM S WHERE AGE>(SELECT AGE WHERE SN=‘王华’)"}, {"key": "D", "text": "SELECT SN,AGE,SEX FROM S WHERE AGE>王华.AGE"}], "answer": ["A"], "explanation": "使用子查询先查出王华的年龄，再查年龄大于该值的学生。C缺少FROM子句，D语法错误。"}, {"id": 40, "kind": "single", "stem": "40、检索选修了“C2”课程的学生中成绩最高的学生的学号，正确的SELECT语句是？（ ）", "options": [{"key": "A", "text": "SELECT S# FROM SC WHERE C#=‘C2’ AND GRADE>=(SELECT GRADE FROM SC WHERE C#=‘C2’)"}, {"key": "B", "text": "SELECT S# FROM SC WHERE C#=‘C2’ AND GRADE IN (SELECT GRADE FROM SC WHERE C#=‘C2’)"}, {"key": "C", "text": "SELECT S# FROM SC WHERE C#=‘C2’ AND GRADE NOT IN (SELECT GRADE FROM SC WHERE C#=‘C2’)"}, {"key": "D", "text": "SELECT S# FROM SC WHERE C#=‘C2’ AND GRADE >=ALL(SELECT GRADE FROM SC WHERE C#=‘C2’)"}], "answer": ["D"], "explanation": ">=ALL(子查询)可以找到成绩大于等于所有C2课程成绩的最高分学生。A的>=子查询返回多行会报错。"}, {"id": 41, "kind": "single", "stem": "41、若要检索学生姓名及所选修课程的课程号和成绩，正确的SELECT语句是？（ ）", "options": [{"key": "A", "text": "SELECT S.SN,SC.C#,SC.GRADE FROM S WHERE S.S#=SC.S#"}, {"key": "B", "text": "SELECT S.SN,SC.C#,SC.GRADE FROM SC WHERE S.S#=SC.S#"}, {"key": "C", "text": "SELECT S.SN,SC.C#,SC.GRADE FROM S,SC WHERE S.S#=SC.S#"}, {"key": "D", "text": "SELECT S.SN,SC.C#,SC.GRADE FROM S,SC"}], "answer": ["C"], "explanation": "多表查询需在FROM中列出所有表，并在WHERE中指定连接条件S.S#=SC.S#。A和B只FROM了一个表却引用了另一个表。"}, {"id": 42, "kind": "single", "stem": "42、若要检索选修4门以上课程的学生总成绩（不统计不及格的课程成绩），并要求按总成绩的降序排序，正确的SELECT语句是？（ ）", "options": [{"key": "A", "text": "SELECT S#,SUM(GRADE) FROM SC WHERE GRADE>=60 GROUP BY S# ORDER BY S# HAVING COUNT(*)>=4"}, {"key": "B", "text": "SELECT S#,SUM(GRADE) FROM SC WHERE GRADE>=60 GROUP BY S# HAVING COUNT(*)>=4 ORDER BY 2 DESC"}, {"key": "C", "text": "SELECT S#,SUM(GRADE) FROM SC WHERE GRADE>=60 GROUP BY S# HAVING COUNT(*)<=4 ORDER BY 2 DESC"}, {"key": "D", "text": "SELECT S#,SUM(GRADE) FROM SC WHERE GRADE>=60 GROUP BY S# HAVING COUNT(*)>=4 ORDER BY 2"}], "answer": ["B"], "explanation": "GROUP BY后用HAVING COUNT(*)>=4筛选，ORDER BY 2 DESC按第二列（总成绩）降序排列。A中ORDER BY应在HAVING之后。"}, {"id": 43, "kind": "single", "stem": "43、选修了“ACCESS”课程且年龄不小于20的全体学生姓名的SQL语句是 SELECT SN FROM S,C,SC WHERE ____。则横线处应该是下列哪项？（ ）", "options": [{"key": "A", "text": "S.S#=SC.S# AND C.C#=SC.C# AND AGE>=20 AND CN=‘ACCESS’"}, {"key": "B", "text": "S.S#=SC.S# OR C.C#=SC.C# AND AGE>=20 AND CN=‘ACCESS’"}, {"key": "C", "text": "AGE>=20 AND CN=‘ACCESS’"}, {"key": "D", "text": "AGE>=20 AND CN=‘ACCESS’"}], "answer": ["A"], "explanation": "三表连接需要两个等值连接条件S.S#=SC.S#和C.C#=SC.C#，加上年龄和课程名筛选条件。"}, {"id": 44, "kind": "single", "stem": "44、在SQL中子查询是（ ）。", "options": [{"key": "A", "text": "返回单表中数据子集的查询语句"}, {"key": "B", "text": "选取多表中字段子集的查询语句"}, {"key": "C", "text": "选取单表中字段子集的查询语句"}, {"key": "D", "text": "嵌入另一个查询语句之中的查询语句"}], "answer": ["D"], "explanation": "子查询（Subquery）是嵌套在另一个查询语句中的SELECT查询。"}, {"id": 45, "kind": "single", "stem": "45、在SQL中条件“年龄 BETWEEN 20 AND 30”表示年龄在20~30岁，且（ ）。", "options": [{"key": "A", "text": "包括20岁和30岁"}, {"key": "B", "text": "不包括20岁和30岁"}, {"key": "C", "text": "包括20岁，但不包括30岁"}, {"key": "D", "text": "包括30岁，但不包括20岁"}], "answer": ["A"], "explanation": "BETWEEN...AND...在SQL中是闭区间，包括边界值20和30。"}, {"id": 46, "kind": "single", "stem": "46、下列聚集函数不忽略空值的是？（ ）", "options": [{"key": "A", "text": "SUM(列名)"}, {"key": "B", "text": "MAX(列名)"}, {"key": "C", "text": "COUNT(*)"}, {"key": "D", "text": "AVG(列名)"}], "answer": ["C"], "explanation": "COUNT(*)统计所有行数，不忽略NULL值行。其他聚集函数（SUM、MAX、AVG）都忽略NULL值。"}, {"id": 47, "kind": "single", "stem": "47、在SQL中，下列涉及空值的操作，不正确的是（ ）。", "options": [{"key": "A", "text": "age IS NULL"}, {"key": "B", "text": "age IS NOT NULL"}, {"key": "C", "text": "age = NULL"}, {"key": "D", "text": "NOT(age IS NULL)"}], "answer": ["C"], "explanation": "判断空值应使用IS NULL，不能使用= NULL，因为NULL与任何值的比较结果都是NULL/UNKNOWN。"}, {"id": 48, "kind": "single", "stem": "48、已知学生选课信息表sc(sno, cno, grade)。查询至少选修了一门课程，但没有学习成绩的学生学号和课程号的SQL语句是（ ）。", "options": [{"key": "A", "text": "SELECT sno,cno FROM sc WHERE grade=NULL"}, {"key": "B", "text": "SELECT sno,cno FROM sc WHERE grade IS ''"}, {"key": "C", "text": "SELECT sno,cno FROM sc WHERE grade IS NULL"}, {"key": "D", "text": "SELECT sno,cno FROM sc WHERE grade=''"}], "answer": ["C"], "explanation": "判断NULL应使用IS NULL而非=NULL或=''。没有成绩即grade为NULL。"}, {"id": 49, "kind": "single", "stem": "49、若用如下SQL语句创建一个student表：CREATE TABLE student(no CHAR(4) NOT NULL, name CHAR(8) NOT NULL, sex CHAR(2), age INT); 那么向student表中插入记录正确的是（ ）。", "options": [{"key": "A", "text": "INSERT INTO student VALUES('1031','曾华','男','23')"}, {"key": "B", "text": "INSERT INTO student VALUES('1031','曾华',NULL,NULL)"}, {"key": "C", "text": "INSERT INTO student VALUES(NULL,'曾华','男','23')"}, {"key": "D", "text": "INSERT INTO student VALUES('1031',NULL,'男',23)"}], "answer": ["B"], "explanation": "no和name有NOT NULL约束不能为NULL。sex和age无NOT NULL约束可以为NULL。A中‘男’没有引号或age加了引号，C中no为NULL违反NOT NULL约束，D中name为NULL违反NOT NULL约束。"}, {"id": 50, "kind": "single", "stem": "50、要在基本表S中增加一列CN（课程名），可用下面哪条语句？（ ）", "options": [{"key": "A", "text": "ADD TABLE S(CN CHAR(8))"}, {"key": "B", "text": "ADD TABLE S ALTER(CN CHAR(8))"}, {"key": "C", "text": "ALTER TABLE S ADD CN CHAR(8)"}, {"key": "D", "text": "ALTER TABLE S(ADD CN CHAR(8))"}], "answer": ["C"], "explanation": "ALTER TABLE S ADD CN CHAR(8)是添加列的正确语法，ADD TABLE不是合法SQL语法。"}, {"id": 51, "kind": "single", "stem": "51、要删除表S中的AGE字段，可以通过下列哪项语句实现？（ ）", "options": [{"key": "A", "text": "DELETE AGE FROM S"}, {"key": "B", "text": "ALTER TABLE S DROP AGE"}, {"key": "C", "text": "UPDATE S AGE"}, {"key": "D", "text": "ALTER TABLE S 'AGE'"}], "answer": ["B"], "explanation": "ALTER TABLE S DROP AGE是删除列的正确语法。DELETE用于删除数据行，不是列。"}, {"id": 52, "kind": "single", "stem": "52、假设关系数据库中有一个表S的关系模式为S(SN,CN,GRADE)，若要将“王二”的化学成绩改为85分，下列哪项操作是正确的？（ ）", "options": [{"key": "A", "text": "UPDATE S SET GRADE=85 WHERE SN=‘王二’ AND CN=‘化学’"}, {"key": "B", "text": "UPDATE S SET GRADE=‘85’ WHERE SN=‘王二’ AND CN=‘化学’"}, {"key": "C", "text": "UPDATE GRADE=85 WHERE SN=‘王二’ AND CN=‘化学’"}, {"key": "D", "text": "UPDATE GRADE=‘85’ WHERE SN=‘王二’ AND CN=‘化学’"}], "answer": ["A"], "explanation": "GRADE为数值型不加引号，UPDATE SET语法正确，WHERE同时指定学生名和课程名。B中数值加引号虽可能隐式转换但不规范。"}, {"id": 53, "kind": "blank", "stem": "53、在SQL中，要删除表aa中的所有数据记录，应使用的语句是____。", "options": [], "answer": ["delete from aa;"], "explanation": "DELETE FROM aa;删除表中所有数据。注意TRUNCATE TABLE aa;也可以，但题干要求DELETE语句。"}, {"id": 54, "kind": "blank", "stem": "54、设有关系SC(sno,cname,grade)，要将所有学生的“数据库技术”课程的成绩增加5分，请补充完整：UPDATE SC ____ WHERE cname=‘数据库技术’;", "options": [], "answer": ["SET grade=grade+5"], "explanation": "SET grade=grade+5实现成绩在原有基础上增加5分。"}, {"id": 55, "kind": "blank", "stem": "55、有关系S(S#,SNAME,AGE)，若需要查询姓名相同的不同学生的学号、姓名，请补充完整：SELECT A.S#,A.SNAME FROM S AS A,S AS B WHERE ____ AND A.S#<>B.S#;", "options": [], "answer": ["A.SNAME=B.SNAME"], "explanation": "自连接查询姓名相同但学号不同的学生，需要A.SNAME=B.SNAME作为等值连接条件。"}, {"id": 56, "kind": "single", "stem": "56、下面哪种数据类型不可以存储数据256？（ ）", "options": [{"key": "A", "text": "BIGINT"}, {"key": "B", "text": "INT"}, {"key": "C", "text": "SMALLINT"}, {"key": "D", "text": "TINYINT"}], "answer": ["D"], "explanation": "TINYINT范围是-128~127（有符号）或0~255（无符号），无法存储256。SMALLINT范围是-32768~32767。"}, {"id": 57, "kind": "single", "stem": "57、下面有关主键和外键之间的关系描述，正确的是？（ ）", "options": [{"key": "A", "text": "一个表中最多只能有一个主键约束，可以有多个外键约束"}, {"key": "B", "text": "一个表中最多只有一个外键约束，也只有一个主键约束"}, {"key": "C", "text": "在定义主键、外键约束时，可以先定义主键约束，也可以先定义外键约束"}, {"key": "D", "text": "在定义主键、外键约束时，应该首先定义外键约束，然后定义主键约束"}], "answer": ["A"], "explanation": "一个表只能有一个主键约束（可由多列组成），但可以有多个外键约束引用不同的父表。"}, {"id": 58, "kind": "single", "stem": "58、下面关于数据库中表的行和列的叙述正确的是？（ ）", "options": [{"key": "A", "text": "表中的行是有序的，列是无序的"}, {"key": "B", "text": "表中的列是有序的，行是无序的"}, {"key": "C", "text": "表中的行和列都是有序的"}, {"key": "D", "text": "表中的行和列都是无序的"}], "answer": ["D"], "explanation": "在关系数据库理论中，表中的行是无序的（集合概念），列也是无序的（属性集合）。这与物理存储中可能存在的顺序无关。"}, {"id": 59, "kind": "single", "stem": "59、在下列SQL语句中，修改表结构的语句是？（ ）", "options": [{"key": "A", "text": "CREATE"}, {"key": "B", "text": "ALTER"}, {"key": "C", "text": "UPDATE"}, {"key": "D", "text": "INSERT"}], "answer": ["B"], "explanation": "ALTER用于修改表结构（DDL），CREATE用于创建，UPDATE修改数据（DML），INSERT插入数据。"}, {"id": 60, "kind": "single", "stem": "60、在MySQL 8.0中，默认的MySQL服务的服务名称是？（ ）", "options": [{"key": "A", "text": "mysql"}, {"key": "B", "text": "mysql57"}, {"key": "C", "text": "mysql80"}, {"key": "D", "text": "mysql8.0"}], "answer": ["C"], "explanation": "MySQL 8.0的默认Windows服务名是MySQL80。"}, {"id": 61, "kind": "single", "stem": "61、下列选项中属于创建数据库的语句是？（ ）", "options": [{"key": "A", "text": "CREATE DATABASE"}, {"key": "B", "text": "ALTER DATABASE"}, {"key": "C", "text": "DROP DATABASE"}, {"key": "D", "text": "以上都不是"}], "answer": ["A"], "explanation": "CREATE DATABASE是创建数据库的语句，ALTER DATABASE修改数据库，DROP DATABASE删除数据库。"}, {"id": 62, "kind": "single", "stem": "62、在创建数据库时，每个数据库都对应存放在一个与数据库同名的（ ）中。", "options": [{"key": "A", "text": "文件"}, {"key": "B", "text": "文件夹"}, {"key": "C", "text": "路径"}, {"key": "D", "text": "以上都不是"}], "answer": ["B"], "explanation": "MySQL中每个数据库对应存放在data目录下与数据库同名的文件夹中。"}, {"id": 63, "kind": "single", "stem": "63、显示当前MySQL服务器上所有数据库的语句是（ ）。", "options": [{"key": "A", "text": "SHOW DATABASES;"}, {"key": "B", "text": "SHOW DATABASE;"}, {"key": "C", "text": "LIST DATABASES;"}, {"key": "D", "text": "LIST DATABASE;"}], "answer": ["A"], "explanation": "SHOW DATABASES;显示所有数据库，DATABASES是复数形式。"}, {"id": 64, "kind": "single", "stem": "64、SQL又称为（ ）。", "options": [{"key": "A", "text": "结构化定义语言"}, {"key": "B", "text": "结构化操纵语言"}, {"key": "C", "text": "结构化控制语言"}, {"key": "D", "text": "结构化查询语言"}], "answer": ["D"], "explanation": "SQL全称是Structured Query Language，即结构化查询语言。"}, {"id": 65, "kind": "single", "stem": "65、下列选项中属于删除数据库的语句是？（ ）", "options": [{"key": "A", "text": "USE DATABASE"}, {"key": "B", "text": "CREATE DATABASE"}, {"key": "C", "text": "DROP DATABASE"}, {"key": "D", "text": "以上都不是"}], "answer": ["C"], "explanation": "DROP DATABASE是删除数据库的语句，USE DATABASE用于切换数据库。"}, {"id": 66, "kind": "single", "stem": "66、下列数据库中，（ ）不是安装MySQL 8.0后默认生成的数据库。", "options": [{"key": "A", "text": "mysql"}, {"key": "B", "text": "test"}, {"key": "C", "text": "information_schema"}, {"key": "D", "text": "performance_schema"}], "answer": ["B"], "explanation": "MySQL 8.0默认生成mysql、information_schema、performance_schema、sys四个数据库，不包含test数据库（早期版本有）。"}, {"id": 67, "kind": "single", "stem": "67、E-R模型中的三要素是（ ）。", "options": [{"key": "A", "text": "实体、属性、实体集"}, {"key": "B", "text": "实体、键、联系"}, {"key": "C", "text": "实体、属性、联系"}, {"key": "D", "text": "实体、域、候选键"}], "answer": ["C"], "explanation": "E-R模型三要素是实体（Entity）、属性（Attribute）、联系（Relationship）。"}, {"id": 68, "kind": "single", "stem": "68、使用关键字（ ）可以将查询结果中的重复行去掉，只保留其中一行记录。", "options": [{"key": "A", "text": "ALL"}, {"key": "B", "text": "DISTINCT"}, {"key": "C", "text": "TOP"}, {"key": "D", "text": "UNION"}], "answer": ["B"], "explanation": "DISTINCT关键字可以去重，只保留不重复的行。ALL是默认行为（保留所有行）。"}, {"id": 69, "kind": "single", "stem": "69、在SELECT语句中与HAVING子句同时使用的是（ ）子句。", "options": [{"key": "A", "text": "ORDER BY"}, {"key": "B", "text": "WHERE"}, {"key": "C", "text": "GROUP BY"}, {"key": "D", "text": "无需配合"}], "answer": ["C"], "explanation": "HAVING和GROUP BY配合使用，对分组结果进行过滤。HAVING通常不能脱离GROUP BY单独使用。"}, {"id": 70, "kind": "true_false", "stem": "70、创建唯一索引时，应保证创建索引的字段不包含重复的数据，并且没有两个或两个以上的空值。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。唯一索引要求字段值不重复，且NULL值不能超过一个（因为多个NULL不会被视为相等，但唯一索引通常允许一个NULL）。"}, {"id": 71, "kind": "true_false", "stem": "71、对视图的一切操作最终要转换成为对基本表的操作。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。视图是虚拟表，对视图的操作最终都会转化为对基本表的操作。"}, {"id": 72, "kind": "blank", "stem": "72、在E-R图中，矩形表示____。", "options": [], "answer": ["实体"], "explanation": "E-R图中矩形表示实体（Entity），菱形表示联系（Relationship），椭圆表示属性（Attribute）。"}, {"id": 73, "kind": "blank", "stem": "73、在MySQL中，可以使用____语句或TRUNCATE语句删除表中的一行或多行数据。", "options": [], "answer": ["delete"], "explanation": "DELETE语句用于删除表中的数据行，可以配合WHERE条件删除指定行。"}, {"id": 74, "kind": "blank", "stem": "74、能唯一标识表中一行的字段或字段组合称为____。", "options": [], "answer": ["主键"], "explanation": "能唯一标识表中一行的字段或字段组合称为主键（Primary Key）。"}, {"id": 75, "kind": "blank", "stem": "75、显示当前数据库下有哪些表的命令是____。", "options": [], "answer": ["show tables;"], "explanation": "SHOW TABLES;显示当前数据库下的所有表。"}, {"id": 76, "kind": "blank", "stem": "76、设置数据表的字段值自动增加使用的选项名称为____。", "options": [], "answer": ["auto_increment"], "explanation": "AUTO_INCREMENT设置字段值自动增加，通常用于主键。"}, {"id": 77, "kind": "blank", "stem": "77、数据类型为DECIMAL(4,2)的字段，可以存储的最大值为____。", "options": [], "answer": ["99.99"], "explanation": "DECIMAL(4,2)总位数4，小数位2，整数部分最多2位，因此最大值为99.99。"}, {"id": 78, "kind": "blank", "stem": "78、将mydb数据库切换为当前数据库的命令是____。", "options": [], "answer": ["use mydb;"], "explanation": "USE mydb;切换当前数据库为mydb。"}, {"id": 79, "kind": "blank", "stem": "79、显示当前服务器中所有数据库的命令是____。", "options": [], "answer": ["show databases;"], "explanation": "SHOW DATABASES;显示当前MySQL服务器中的所有数据库。"}, {"id": 80, "kind": "true_false", "stem": "80、MySQL是层次模型的数据库产品。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。MySQL是关系型数据库管理系统（RDBMS），不是层次模型数据库。层次模型的典型代表是IBM的IMS。"}, {"id": 81, "kind": "true_false", "stem": "81、数据库管理员的缩写为DBA。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。DBA是Database Administrator（数据库管理员）的缩写。"}, {"id": 82, "kind": "true_false", "stem": "82、数据库管理系统是数据库系统的核心。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。DBMS（数据库管理系统）是数据库系统的核心软件。"}, {"id": 83, "kind": "true_false", "stem": "83、E-R图在需求分析阶段生成。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。E-R图在概念设计阶段生成，需求分析阶段的产物是数据流图和数据字典等。"}, {"id": 84, "kind": "true_false", "stem": "84、在数据库设计中，概念设计的结果是一个与DBMS无关的概念模式。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。概念设计的结果是概念模式（如E-R图），与具体DBMS无关。"}, {"id": 85, "kind": "true_false", "stem": "85、ORDER BY子句可以实现分组查询。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。ORDER BY用于排序，GROUP BY才用于分组查询。"}, {"id": 86, "kind": "true_false", "stem": "86、查询出表中的所有列时，可以使用SELECT *。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。SELECT * 可以查询表中所有列。"}, {"id": 87, "kind": "true_false", "stem": "87、x BETWEEN y AND z 等同于 x>y AND x<z。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。BETWEEN...AND是闭区间，等同于 x>=y AND x<=z，而不是严格的 x>y AND x<z。"}, {"id": 88, "kind": "true_false", "stem": "88、INSERT语句所插入的数据行数据可以来自另外一个SELECT语句的结果集。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。INSERT INTO ... SELECT ... 可以从SELECT结果集插入数据。"}, {"id": 89, "kind": "true_false", "stem": "89、在MySQL中，局部变量应该在存储过程、存储函数、触发器中定义。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。局部变量只能在存储过程、存储函数、触发器等程序块中定义和使用。"}, {"id": 90, "kind": "true_false", "stem": "90、SQL语言只涉及查询数据的语句，并不包括修改和删除数据的语句。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。SQL包括数据查询（DQL）、数据操纵（DML如INSERT/UPDATE/DELETE）、数据定义（DDL）和数据控制（DCL）。"}, {"id": 91, "kind": "true_false", "stem": "91、触发器不用被调用，它可以自动执行。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。触发器是自动执行的，当触发事件（INSERT/UPDATE/DELETE）发生时自动触发，不需要显式调用。"}, {"id": 92, "kind": "true_false", "stem": "92、触发器可通过数据库中的相关表实现级联操作。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["A"], "explanation": "正确。触发器可以实现级联操作，如删除主表记录时自动删除从表关联记录。"}, {"id": 93, "kind": "true_false", "stem": "93、数据库管理系统DBMS是操作系统的一部分。", "options": [{"key": "A", "text": "正确"}, {"key": "B", "text": "错误"}], "answer": ["B"], "explanation": "错误。DBMS不是操作系统的一部分，是独立的数据管理软件，运行在操作系统之上。"}, {"id": 94, "kind": "true_false", "stem": "94、DBS是采用了数据库技术的计算机系统。DBS是一个集合体，包含计算机硬件、DB、DBMS、数据库应用系统等软件和用户。", "options": [{"key": "A", "text": "正确"}, {"key": "B let currentMode = null;
let examQuestions = [];
let examAnswers = {};
let examBlankAnswers = {};
let timerInterval = null;
let timeLeft = 0;
let examSubmitted = false;

// Review state
let reviewFilter = 'all';
let reviewSearch = '';
let reviewPage = 1;
const PER_PAGE = 20;

// Wrong Book
const WRONG_BOOK_KEY = 'mysql-wrong-book';

function getWrongBook() {
  try {
    return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || '[]');
  } catch (e) { return []; }
}

function saveWrongBook(ids) {
  localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(ids));
}

function toggleWrongBook(qId, btn) {
  let ids = getWrongBook();
  const idx = ids.indexOf(qId);
  if (idx >= 0) { ids.splice(idx, 1); }
  else { ids.push(qId); }
  saveWrongBook(ids);

  if (reviewFilter === 'wrong-book') {
    // 错题本模式：取消收藏时直接从 DOM 移除该题卡片，避免全量重建
    const card = btn.closest('.question-card');
    if (card) card.remove();
    const list = document.getElementById('review-list');
    if (list.children.length === 0) {
      list.innerHTML = '<div class="wrong-book-empty">错题本为空</div>';
      document.getElementById('pagination').innerHTML = '';
    } else {
      const filtered = getFilteredQuestions();
      const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      if (reviewPage > totalPages) reviewPage = totalPages;
      renderPagination(totalPages, filtered.length);
    }
  } else {
    // 非错题本模式：仅切换当前按钮样式，不做任何 DOM 重建
    const nowBookmarked = idx < 0;
    if (nowBookmarked) {
      btn.classList.add('bookmarked');
      btn.textContent = '⭐';
      btn.title = '移出错题本';
    } else {
      btn.classList.remove('bookmarked');
      btn.textContent = '☆';
      btn.title = '加入错题本';
    }
  }
}

function isInWrongBook(qId) {
  return getWrongBook().includes(qId);
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  document.getElementById('exam-config').classList.toggle('active', mode === 'exam');
  document.getElementById('review-section').style.display = mode === 'review' ? 'block' : 'none';
  document.getElementById('exam-section').style.display = 'none';
  document.getElementById('score-panel').classList.remove('active');
  document.getElementById('timer-bar').classList.remove('active');
  document.getElementById('nav-bar').classList.remove('active');
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (mode === 'review') { reviewPage = 1; renderReview(); }
}

function toggleExamScope() {
  const scope = document.getElementById('exam-scope').value;
  document.getElementById('random-config').style.display = scope === 'random' ? 'block' : 'none';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExam() {
  const scope = document.getElementById('exam-scope').value;
  let singles = allQuestions.filter(q => q.kind === 'single');
  let tfs = allQuestions.filter(q => q.kind === 'true_false');
  let blanks = allQuestions.filter(q => q.kind === 'blank');

  if (scope === 'random') {
    const sc = Math.min(parseInt(document.getElementById('single-count').value) || 30, singles.length);
    const tc = Math.min(parseInt(document.getElementById('tf-count').value) || 10, tfs.length);
    const bc = Math.min(parseInt(document.getElementById('blank-count').value) || 8, blanks.length);
    examQuestions = [...shuffle(singles).slice(0, sc), ...shuffle(tfs).slice(0, tc), ...shuffle(blanks).slice(0, bc)];
  } else {
    examQuestions = shuffle(allQuestions);
  }

  examAnswers = {};
  examBlankAnswers = {};
  examSubmitted = false;
  timeLeft = (parseInt(document.getElementById('exam-time').value) || 60) * 60;

  document.getElementById('exam-config').classList.remove('active');
  document.getElementById('review-section').style.display = 'none';
  document.getElementById('score-panel').classList.remove('active');
  document.getElementById('exam-section').style.display = 'block';
  document.getElementById('timer-bar').classList.add('active');
  document.getElementById('nav-bar').classList.add('active');

  renderExamQuestions();
  renderNavBar();
  document.getElementById('nav-bar').classList.add('collapsed');
  document.getElementById('nav-toggle-btn').textContent = '☰';
  startTimer();
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      doSubmit();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const display = document.getElementById('timer-display');
  display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  display.className = 'timer-display' + (timeLeft <= 60 ? ' danger' : timeLeft <= 300 ? ' warning' : '');
  const answered = Object.keys(examAnswers).length + Object.keys(examBlankAnswers).length;
  document.getElementById('answered-count').textContent = '已答: ' + answered + '/' + examQuestions.length;
}

function renderNavBar() {
  const nav = document.getElementById('nav-inner');
  nav.innerHTML = examQuestions.map((q, i) => {
    const answered = examAnswers[i] !== undefined || examBlankAnswers[i] !== undefined;
    return '<div class="nav-dot' + (answered ? ' answered' : '') + '" onclick="scrollToQ(' + i + ')" title="第' + (i+1) + '题">' + (i+1) + '</div>';
  }).join('');
}

function updateNavDotState(idx) {
  const dots = document.querySelectorAll('#nav-inner .nav-dot');
  if (dots[idx]) {
    const hasAnswer = examAnswers[idx] !== undefined || examBlankAnswers[idx] !== undefined;
    dots[idx].classList.toggle('answered', hasAnswer);
  }
}

function scrollToQ(idx) {
  const el = document.getElementById('exam-q-' + idx);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('highlight');
    setTimeout(() => el.classList.remove('highlight'), 1500);
  }
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('current', i === idx));
  const navInner = document.getElementById('nav-inner');
  const currentDot = navInner.querySelector('.nav-dot.current');
  if (currentDot && document.getElementById('nav-bar').classList.contains('collapsed')) {
    currentDot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function toggleNavExpand() {
  const nav = document.getElementById('nav-bar');
  const btn = document.getElementById('nav-toggle-btn');
  const collapsed = nav.classList.toggle('collapsed');
  btn.textContent = collapsed ? '☰' : '✕';
  if (!collapsed) {
    const currentDot = document.getElementById('nav-inner').querySelector('.nav-dot.current');
    if (currentDot) {
      setTimeout(() => currentDot.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
  }
}

function getKindLabel(kind) {
  if (kind === 'single') return '单选题';
  if (kind === 'true_false') return '判断题';
  if (kind === 'blank') return '填空题';
  return kind;
}

function getKindClass(kind) {
  if (kind === 'single') return 'kind-single';
  if (kind === 'true_false') return 'kind-true-false';
  if (kind === 'blank') return 'kind-blank';
  return '';
}

function renderExamQuestions() {
  const container = document.getElementById('exam-section');
  container.innerHTML = examQuestions.map((q, i) => {
    const kindLabel = getKindLabel(q.kind);
    const kindClass = getKindClass(q.kind);

    if (q.kind === 'blank') {
      // Fill-in-the-blank question
      return '<div class="question-card" id="exam-q-' + i + '">'
        + '<div class="question-header">'
        + '<span class="question-number">第 ' + (i+1) + ' 题</span>'
        + '<span class="question-kind ' + kindClass + '">' + kindLabel + '</span>'
        + '</div>'
        + '<div class="question-stem">' + escapeHtml(q.stem) + '</div>'
        + '<div style="margin-bottom:12px;">'
        + '<input type="text" class="blank-input" id="blank-input-' + i + '" placeholder="请输入答案..." oninput="onBlankInput(' + i + ', this.value)" />'
        + '</div>'
        + '<div class="explanation" id="exam-exp-' + i + '">'
        + '<div class="answer-label">正确答案：' + q.answer.join(' 或 ') + '</div>'
        + '<div class="label">解析：</div>'
        + '<div>' + escapeHtml(q.explanation || '暂无解析') + '</div>'
        + '</div>'
        + '</div>';
    }

    // Single choice / True-False
    const optionsHtml = q.options.map(opt => {
      return '<div class="option-item" data-q="' + i + '" data-key="' + opt.key + '" onclick="selectOption(' + i + ',\'' + opt.key + '\',' + (q.kind === 'multi') + ')">'
        + '<span class="option-key">' + opt.key + '</span>'
        + '<span>' + escapeHtml(opt.text) + '</span>'
        + '</div>';
    }).join('');
    return '<div class="question-card" id="exam-q-' + i + '">'
      + '<div class="question-header">'
      + '<span class="question-number">第 ' + (i+1) + ' 题</span>'
      + '<span class="question-kind ' + kindClass + '">' + kindLabel + '</span>'
      + '</div>'
      + '<div class="question-stem">' + escapeHtml(q.stem) + '</div>'
      + '<div class="options-list">' + optionsHtml + '</div>'
      + '<div class="explanation" id="exam-exp-' + i + '">'
      + '<div class="answer-label">正确答案：' + q.answer.join('、') + '</div>'
      + '<div class="label">解析：</div>'
      + '<div>' + escapeHtml(q.explanation || '暂无解析') + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function onBlankInput(qIdx, value) {
  if (examSubmitted) return;
  if (value.trim()) {
    examBlankAnswers[qIdx] = value.trim();
  } else {
    delete examBlankAnswers[qIdx];
  }
  updateNavDotState(qIdx);
}

function selectOption(qIdx, key, isMulti) {
  if (examSubmitted) return;
  if (!isMulti) {
    examAnswers[qIdx] = [key];
    // Also remove blank answer if switching modes
    delete examBlankAnswers[qIdx];
    document.querySelectorAll('[data-q="' + qIdx + '"]').forEach(el => {
      el.classList.toggle('selected', el.dataset.key === key);
    });
  } else {
    if (!examAnswers[qIdx]) examAnswers[qIdx] = [];
    const idx = examAnswers[qIdx].indexOf(key);
    if (idx >= 0) {
      examAnswers[qIdx].splice(idx, 1);
    } else {
      examAnswers[qIdx].push(key);
    }
    if (examAnswers[qIdx].length === 0) delete examAnswers[qIdx];
    document.querySelectorAll('[data-q="' + qIdx + '"]').forEach(el => {
      el.classList.toggle('selected', examAnswers[qIdx] && examAnswers[qIdx].includes(el.dataset.key));
    });
  }
  updateNavDotState(qIdx);
}

function confirmSubmit() {
  const unanswered = [];
  for (let i = 0; i < examQuestions.length; i++) {
    if (!examAnswers[i] && !examBlankAnswers[i]) unanswered.push(i + 1);
  }
  let msg;
  if (unanswered.length > 0) {
    const list = unanswered.slice(0, 20).join('、');
    const suffix = unanswered.length > 20 ? '等' + unanswered.length + '题' : '题';
    msg = '第' + list + suffix + '尚未作答，确定要提交吗？';
  } else {
    msg = '已全部作答，确定要交卷吗？';
  }
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('active');
}

function doSubmit() {
  closeModal();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  examSubmitted = true;

  let correct = 0, wrong = 0, skip = 0;
  const wrongQIds = [];
  examQuestions.forEach((q, i) => {
    if (q.kind === 'blank') {
      const userAns = examBlankAnswers[i];
      if (!userAns) { skip++; return; }
      // Check if user answer matches any acceptable answer (case-insensitive, trimmed)
      const correctAnswers = q.answer.map(a => a.trim().toLowerCase());
      const isCorrect = correctAnswers.includes(userAns.toLowerCase());
      if (isCorrect) correct++;
      else { wrong++; wrongQIds.push(q.id); }

      // Highlight input
      const input = document.getElementById('blank-input-' + i);
      if (input) {
        input.disabled = true;
        input.classList.toggle('correct-blank', isCorrect);
        input.classList.toggle('wrong-blank', !isCorrect);
      }
    } else {
      const userAns = examAnswers[i];
      if (!userAns) { skip++; return; }
      const correctAns = [...q.answer].sort();
      const userSorted = [...userAns].sort();
      const isCorrect = correctAns.length === userSorted.length && correctAns.every((v, j) => v === userSorted[j]);
      if (isCorrect) correct++;
      else { wrong++; wrongQIds.push(q.id); }

      // Highlight options
      const items = document.querySelectorAll('[data-q="' + i + '"]');
      items.forEach(el => {
        el.classList.remove('selected');
        const k = el.dataset.key;
        if (correctAns.includes(k)) el.classList.add('correct');
        if (userSorted.includes(k) && !correctAns.includes(k)) el.classList.add('wrong');
      });
    }
    document.getElementById('exam-exp-' + i).classList.add('visible');
  });

  const total = examQuestions.length;
  const score = total > 0 ? Math.round(correct / total * 100) : 0;

  // Add wrong questions to wrong book
  if (wrongQIds.length > 0) {
    const wb = getWrongBook();
    const merged = [...new Set([...wb, ...wrongQIds])];
    saveWrongBook(merged);
  }

  document.getElementById('timer-bar').classList.remove('active');
  document.getElementById('nav-bar').classList.remove('active');
  document.getElementById('score-panel').classList.add('active');
  document.getElementById('score-num').textContent = score;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reviewExamResults() {
  document.getElementById('score-panel').classList.remove('active');
  document.getElementById('exam-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToHome() {
  document.getElementById('score-panel').classList.remove('active');
  document.getElementById('exam-section').style.display = 'none';
  document.getElementById('timer-bar').classList.remove('active');
  document.getElementById('nav-bar').classList.remove('active');
  currentMode = null;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Review Mode
function getFilteredQuestions() {
  let qs = allQuestions;
  if (reviewFilter === 'wrong-book') {
    const wbIds = getWrongBook();
    qs = qs.filter(q => wbIds.includes(q.id));
  } else if (reviewFilter !== 'all') {
    qs = qs.filter(q => q.kind === reviewFilter);
  }
  if (reviewSearch.trim()) {
    const s = reviewSearch.trim().toLowerCase();
    qs = qs.filter(q => q.stem.toLowerCase().includes(s) || q.options.some(o => o.text.toLowerCase().includes(s)));
  }
  return qs;
}

function renderReview() {
  const filtered = getFilteredQuestions();

  if (reviewFilter === 'wrong-book' && filtered.length === 0) {
    document.getElementById('review-list').innerHTML = '<div class="wrong-book-empty">错题本为空</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  if (reviewPage > totalPages) reviewPage = totalPages;
  const start = (reviewPage - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);

  const list = document.getElementById('review-list');
  list.innerHTML = pageItems.map((q, idx) => {
    const realIdx = allQuestions.indexOf(q);
    const qId = q.id || (realIdx + 1);
    const kindLabel = getKindLabel(q.kind);
    const kindClass = getKindClass(q.kind);
    const bookmarked = isInWrongBook(qId);
    const starBtn = '<button class="wrong-book-btn' + (bookmarked ? ' bookmarked' : '') + '" onclick="event.stopPropagation();toggleWrongBook(' + qId + ', this)" title="' + (bookmarked ? '移出错题本' : '加入错题本') + '">' + (bookmarked ? '⭐' : '☆') + '</button>';
    const starStem = (reviewFilter === 'wrong-book' && bookmarked) ? '<span class="wrong-book-star">⭐</span>' : '';

    if (q.kind === 'blank') {
      return '<div class="question-card">'
        + '<div class="question-header">'
        + '<span class="question-number">第 ' + qId + ' 题</span>'
        + '<span class="question-kind ' + kindClass + '">' + kindLabel + '</span>'
        + starBtn
        + '</div>'
        + '<div class="question-stem">' + starStem + escapeHtml(q.stem) + '</div>'
        + '<button class="review-toggle" onclick="toggleExplanation(this)">显示答案与解析</button>'
        + '<div class="explanation">'
        + '<div class="answer-label">正确答案：' + q.answer.join(' 或 ') + '</div>'
        + '<div class="label">解析：</div>'
        + '<div>' + escapeHtml(q.explanation || '暂无解析') + '</div>'
        + '</div>'
        + '</div>';
    }

    const optionsHtml = q.options.map(opt => {
      const isCorrect = q.answer.includes(opt.key);
      return '<div class="option-item' + (isCorrect ? ' correct' : '') + '">'
        + '<span class="option-key">' + opt.key + '</span>'
        + '<span>' + escapeHtml(opt.text) + '</span>'
        + '</div>';
    }).join('');
    return '<div class="question-card">'
      + '<div class="question-header">'
      + '<span class="question-number">第 ' + qId + ' 题</span>'
      + '<span class="question-kind ' + kindClass + '">' + kindLabel + '</span>'
      + starBtn
      + '</div>'
      + '<div class="question-stem">' + starStem + escapeHtml(q.stem) + '</div>'
      + '<div class="options-list">' + optionsHtml + '</div>'
      + '<button class="review-toggle" onclick="toggleExplanation(this)">显示解析</button>'
      + '<div class="explanation">'
      + '<div class="answer-label">正确答案：' + q.answer.join('、') + '</div>'
      + '<div class="label">解析：</div>'
      + '<div>' + escapeHtml(q.explanation || '暂无解析') + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  renderPagination(totalPages, filtered.length);
}

function toggleExplanation(btn) {
  const exp = btn.nextElementSibling;
  const visible = exp.classList.toggle('visible');
  btn.textContent = visible ? '隐藏解析' : '显示答案与解析';
}

function setFilter(filter, btn) {
  reviewFilter = filter;
  reviewPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview();
}

let searchTimer = null;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    reviewSearch = document.getElementById('search-input').value;
    reviewPage = 1;
    renderReview();
  }, 300);
}

function renderPagination(totalPages, totalItems) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) {
    pg.innerHTML = '<span class="page-info">共 ' + totalItems + ' 题</span>';
    return;
  }
  let html = '<button class="page-btn" onclick="goPage(' + (reviewPage - 1) + ')" ' + (reviewPage <= 1 ? 'disabled' : '') + '>‹</button>';
  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= reviewPage - 2 && i <= reviewPage + 2)) {
      range.push(i);
    }
  }
  let last = 0;
  for (const p of range) {
    if (last && p - last > 1) html += '<span style="color:var(--text-secondary)">…</span>';
    html += '<button class="page-btn' + (p === reviewPage ? ' active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    last = p;
  }
  html += '<button class="page-btn" onclick="goPage(' + (reviewPage + 1) + ')" ' + (reviewPage >= totalPages ? 'disabled' : '') + '>›</button>';
  html += '<span class="page-info">共 ' + totalItems + ' 题</span>';
  pg.innerHTML = html;
}

function goPage(p) {
  const filtered = getFilteredQuestions();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  if (p < 1 || p > totalPages) return;
  reviewPage = p;
  renderReview();
  window.scrollTo({ top: document.getElementById('review-section').offsetTop - 20, behavior: 'smooth' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
